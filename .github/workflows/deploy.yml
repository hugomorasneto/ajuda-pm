name: Deploy Frontend (Hostinger FTP)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Show runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies (strict)
        id: install_strict
        continue-on-error: true
        run: npm ci

      - name: Install dependencies (fallback)
        if: steps.install_strict.outcome == 'failure'
        run: |
          echo "npm ci falhou; executando fallback controlado com npm install"
          npm install --no-audit --no-fund

      - name: Quality gate and production bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run quality

      - name: Deploy dist/ via FTP
        if: github.event_name != 'pull_request'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
